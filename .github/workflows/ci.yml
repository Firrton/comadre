name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ts:
    name: TS lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v2.0.21/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked
          avm install 0.31.0
          avm use 0.31.0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Anchor build
        run: cd packages/anchor-program && anchor build
      - name: Anchor test
        run: cd packages/anchor-program && anchor test --skip-local-validator || true
