name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ts:
    name: TS lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm is the package manager (root packageManager field): turbo
      # resolves the workspace through it and installs must use it — bun
      # 1.2 cannot consume pnpm-lock.yaml. bun stays as the test runtime.
      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      # monad-contracts tests run through forge (turbo run test includes them)
      - uses: foundry-rs/foundry-toolchain@v1
      - run: pnpm install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test

  migrate:
    name: DB migrations
    needs: ts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip-deploy]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0
      - run: pnpm install --frozen-lockfile
      - name: Run pending migrations
        working-directory: packages/db
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: bun run migrate

  deploy:
    name: Deploy to Railway
    needs: [ts, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip-deploy]')
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: railway up --service api
      - run: railway up --service whatsapp
      - run: railway up --service agent
      - run: railway up --service cron
