# Railway config — cron service
# Dashboard: Settings → Config File Path → /infra/railway.cron.toml
#
# No build step: bun runs TypeScript directly at runtime.
# REPLICA COUNT MUST BE 1 — node-cron has no distributed lock; running
# multiple replicas would fire every job N times simultaneously.

[build]
builder = "RAILPACK"
buildCommand = "bun install --frozen-lockfile"
watchPatterns = ["apps/cron/**", "packages/**"]

[deploy]
startCommand = "bun apps/cron/src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
