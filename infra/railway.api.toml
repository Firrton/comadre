# Railway config — api service
# Dashboard: Settings → Config File Path → /infra/railway.api.toml

[build]
builder = "RAILPACK"
buildCommand = "bun install --frozen-lockfile && bun build apps/api/src/index.ts --target=bun --outdir=apps/api/dist"
watchPatterns = ["apps/api/**", "packages/**"]

[deploy]
startCommand = "bun apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
