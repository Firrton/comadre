[package]
name = "comadre"
version = "0.0.1"
description = "Comadre — tandas on-chain en Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "comadre"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
# IMPORTANT: localnet is in default for local development and CI. Remove "localnet" from
# default[] before mainnet deploy to re-enable the deployer-only guard in init_config.
default = ["localnet"]
devnet = []
# localnet: skips deployer-only guard in init_config so that anchor test (local validator)
# works without a well-known deployer keypair baked in. Must be removed from default[] before
# mainnet deploy.
localnet = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]

[dependencies]
anchor-lang = { version = "0.31.0", features = ["init-if-needed", "event-cpi"] }
anchor-spl = "0.31.0"
