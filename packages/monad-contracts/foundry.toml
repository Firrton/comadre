[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

solc_version = "0.8.28"
evm_version = "prague"
optimizer = true
optimizer_runs = 200

# Surface storage layout for audit and indexer reference. Lint notes (e.g.
# asm-keccak256 micro-optimization) are informational only — we prefer
# readable Solidity over inline assembly for the core protocol.
extra_output = ["storageLayout"]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"

[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
monad_mainnet = "https://rpc.monad.xyz"

[etherscan]
# Verification fallback via Sourcify (Monad). Primary verifier set per-script.
